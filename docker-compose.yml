version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:4200
    networks:
      - portfolio-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        LOCALE: pt
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
