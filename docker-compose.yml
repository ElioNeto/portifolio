version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portfolio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ALLOWED_ORIGINS: http://localhost:4200
      DATABASE_URL: postgres://portfolio:portfolio@postgres:5432/portfolio
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        LOCALE: pt
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - portfolio-net

volumes:
  postgres_data:

networks:
  portfolio-net:
    driver: bridge
