name: Deploy Frontend → Railway

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale para deploy (pt | en | es | all)'
        required: false
        default: 'all'

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Deploy frontend-${{ matrix.locale }}
    runs-on: ubuntu-latest
    environment: production

    strategy:
      matrix:
        locale: [pt, en, es]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN não configurado."
            echo "::error::Rode primeiro o workflow: Provision Railway Infra"
            exit 1
          fi
          echo "✅ RAILWAY_TOKEN OK."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build locale ${{ matrix.locale }}
        run: cd frontend && npm run build:${{ matrix.locale }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Resolve service name (${{ matrix.locale }})
        id: service
        env:
          LOCALE: ${{ matrix.locale }}
          VAR_PT: ${{ vars.RAILWAY_FRONTEND_PT_SERVICE }}
          VAR_EN: ${{ vars.RAILWAY_FRONTEND_EN_SERVICE }}
          VAR_ES: ${{ vars.RAILWAY_FRONTEND_ES_SERVICE }}
        run: |
          case "$LOCALE" in
            pt) NAME="${VAR_PT:-frontend-pt}" ;;
            en) NAME="${VAR_EN:-frontend-en}" ;;
            es) NAME="${VAR_ES:-frontend-es}" ;;
          esac
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "📦 Service: $NAME"

      - name: Deploy frontend-${{ matrix.locale }} to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: frontend
        run: |
          railway up \
            --service "${{ steps.service.outputs.name }}" \
            --detach
