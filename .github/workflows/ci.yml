name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        run: cd backend && go build ./...
      - name: Test
        run: cd backend && go test ./...

  frontend:
    name: Angular Build (PT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Build PT
        run: cd frontend && npm run build:pt
      - name: Build EN
        run: cd frontend && npm run build:en
      - name: Build ES
        run: cd frontend && npm run build:es
