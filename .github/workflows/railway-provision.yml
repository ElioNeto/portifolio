name: ⚡ Provision Railway Infra

# Rode este workflow UMA VEZ para criar toda a infra no Railway.
# Requer RAILWAY_API_TOKEN (Account Token) — NAO o RAILWAY_TOKEN (Project Token)
#
# Como obter:
#   1. Acesse https://railway.app/account/tokens
#   2. Clique em "Create Token" (Account Token)
#   3. Adicione como Secret: RAILWAY_API_TOKEN

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nome do projeto no Railway'
        required: true
        default: 'portifolio'
      backend_url_override:
        description: 'URL publica do backend (opcional)'
        required: false
        default: ''

jobs:
  provision:
    name: Create Railway Project & Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate RAILWAY_API_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_API_TOKEN }}" ]; then
            echo "::error::RAILWAY_API_TOKEN nao configurado!"
            echo "::error::1. Acesse https://railway.app/account/tokens"
            echo "::error::2. Crie um Account Token (nao Project Token)"
            echo "::error::3. Adicione como Secret: RAILWAY_API_TOKEN"
            exit 1
          fi
          echo "✅ RAILWAY_API_TOKEN presente."

      - name: Install Railway CLI + jq
        run: |
          npm install -g @railway/cli
          sudo apt-get install -y jq

      - name: Install GitHub CLI
        run: |
          type -p gh || (sudo apt update && sudo apt install gh -y)

      - name: Provision Railway infra
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          BACKEND_URL_OVERRIDE: ${{ github.event.inputs.backend_url_override }}
          REPO: ${{ github.repository }}
        run: bash scripts/provision-railway.sh

      - name: Summary
        run: |
          echo "## ⚡ Railway Infra Provisionada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Proximos passos:" >> $GITHUB_STEP_SUMMARY
          echo "1. Crie um Project Token em railway.app e adicione como \`RAILWAY_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Rode **Deploy Backend** e **Deploy Frontend**" >> $GITHUB_STEP_SUMMARY
