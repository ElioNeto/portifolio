name: ⚡ Provision Railway Infra

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nome do projeto no Railway'
        required: true
        default: 'portifolio'
      backend_url_override:
        description: 'URL publica do backend (opcional)'
        required: false
        default: ''

jobs:
  provision:
    name: Create Railway Project & Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (jq + gh)
        run: |
          sudo apt-get install -y jq
          type -p gh || (sudo apt update && sudo apt install gh -y)

      - name: Validate RAILWAY_API_TOKEN
        run: |
          if [ -z "${{ secrets.RAILWAY_API_TOKEN }}" ]; then
            echo "::error::RAILWAY_API_TOKEN nao configurado!"
            echo "::error::Acesse https://railway.app/account/tokens e crie um Account Token"
            exit 1
          fi
          echo "✅ RAILWAY_API_TOKEN presente (${#RAILWAY_API_TOKEN} chars)."
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}

      - name: "[DIAG] Railway whoami (raw curl)"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          echo "=== Testando autenticacao Railway API ==="
          RESP=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
            -d '{"query": "{ me { id email name } }"}')
          echo "Raw response: $RESP"
          # Extrai email se der certo
          EMAIL=$(echo "$RESP" | jq -r '.data.me.email // empty' 2>/dev/null || echo "")
          if [ -n "$EMAIL" ]; then
            echo "✅ Autenticado como: $EMAIL"
          else
            ERRMSG=$(echo "$RESP" | jq -r '.errors[0].message // .message // "resposta inesperada"' 2>/dev/null || echo "erro desconhecido")
            echo "::error::Falha na autenticacao Railway: $ERRMSG"
            echo "::error::Resposta completa: $RESP"
            exit 1
          fi

      - name: Provision Railway infra
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
          BACKEND_URL_OVERRIDE: ${{ github.event.inputs.backend_url_override }}
          REPO: ${{ github.repository }}
        run: bash scripts/provision-railway.sh

      - name: Summary
        if: success()
        run: |
          echo "## ⚡ Railway Infra Provisionada" >> $GITHUB_STEP_SUMMARY
          echo "Proximos passos:" >> $GITHUB_STEP_SUMMARY
          echo "1. Crie um Project Token: https://railway.app/account/tokens" >> $GITHUB_STEP_SUMMARY
          echo "2. Adicione como Secret \`RAILWAY_TOKEN\` no GitHub" >> $GITHUB_STEP_SUMMARY
          echo "3. Rode: Deploy Backend e Deploy Frontend" >> $GITHUB_STEP_SUMMARY
