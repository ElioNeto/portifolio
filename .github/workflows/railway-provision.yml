name: ⚡ Provision Railway Infra

# Rode este workflow UMA VEZ para criar os servicos no Railway.
#
# Pre-requisitos:
#   1. Crie o projeto manualmente no Railway Dashboard
#   2. Copie o Project ID: Railway -> Projeto -> Settings -> General -> Project ID
#   3. Gere um Account Token: https://railway.app/account/tokens
#   4. Adicione RAILWAY_TOKEN como Secret do repositorio GitHub

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Railway Project ID (Settings -> General -> Project ID)'
        required: true
        default: ''
      backend_url_override:
        description: 'URL publica do backend (opcional — preencha apos o 1o deploy)'
        required: false
        default: ''
      database_url_override:
        description: 'DATABASE_URL manual (opcional — alternativa ao Add Reference)'
        required: false
        default: ''

jobs:
  provision:
    name: Create Railway Services & Variables
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN nao configurado como Secret!"
            echo "::error::Acesse: https://github.com/ElioNeto/portifolio/settings/secrets/actions"
            exit 1
          fi
          if [ -z "${{ github.event.inputs.project_id }}" ]; then
            echo "::error::project_id obrigatorio!"
            echo "::error::Copie em: Railway Dashboard -> Projeto -> Settings -> General -> Project ID"
            exit 1
          fi
          echo "✅ Inputs OK."

      - name: Provision Railway services
        env:
          RAILWAY_TOKEN:         ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID:    ${{ github.event.inputs.project_id }}
          GH_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          BACKEND_URL_OVERRIDE:  ${{ github.event.inputs.backend_url_override }}
          DATABASE_URL_OVERRIDE: ${{ github.event.inputs.database_url_override }}
          REPO:                  ${{ github.repository }}
        run: bash scripts/provision-railway.sh

      - name: Summary
        if: success()
        run: |
          echo "## ⚡ Railway Infra Provisionada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Os IDs foram gravados automaticamente no GitHub Environment 'production'." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Proximos passos" >> $GITHUB_STEP_SUMMARY
          echo "1. Adicione PostgreSQL: Railway Dashboard -> **+ New Service** -> **Database** -> **PostgreSQL**" >> $GITHUB_STEP_SUMMARY
          echo "2. Linke ao backend: **backend** -> **Variables** -> **Add Reference** -> \`DATABASE_URL\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Configure root directory de cada servico no Railway Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "4. Rode: **Deploy Backend -> Railway**" >> $GITHUB_STEP_SUMMARY
          echo "5. Rode: **Deploy Frontend -> Railway**" >> $GITHUB_STEP_SUMMARY
          echo "6. Atualize a variavel \`BACKEND_URL\` com a URL real do backend" >> $GITHUB_STEP_SUMMARY
