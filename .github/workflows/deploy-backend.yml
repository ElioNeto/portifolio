name: Deploy Backend → Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'railway.toml'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Go Backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ vars.RAILWAY_BACKEND_SERVICE }} \
            --detach

      - name: Wait for deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "⏳ Aguardando deploy ficar saudável..."
          sleep 20
          STATUS=$(railway status --service ${{ vars.RAILWAY_BACKEND_SERVICE }} --json 2>/dev/null | jq -r '.deployments[0].status' 2>/dev/null || echo "unknown")
          echo "Status: $STATUS"

      - name: Health check
        run: |
          echo "🔍 Verificando /health..."
          for i in {1..10}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.BACKEND_URL }}/health || echo "000")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Backend online!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check falhou após 10 tentativas"
          exit 1
