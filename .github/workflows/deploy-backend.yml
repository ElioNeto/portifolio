name: Deploy Backend → Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend/railway.toml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Go Backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "::error::RAILWAY_TOKEN não configurado."
            echo "::error::Rode primeiro o workflow: Provision Railway Infra"
            exit 1
          fi
          if [ -z "${{ vars.RAILWAY_BACKEND_SERVICE }}" ]; then
            echo "::error::RAILWAY_BACKEND_SERVICE não definida."
            echo "::error::Rode primeiro o workflow: Provision Railway Infra"
            exit 1
          fi
          echo "✅ Secrets e vars OK."

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: backend
        run: |
          echo "🚀 Deploying service: ${{ vars.RAILWAY_BACKEND_SERVICE }}"
          railway up \
            --service "${{ vars.RAILWAY_BACKEND_SERVICE }}" \
            --detach

      - name: Health check
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::BACKEND_URL não definida. Pulando health check."
            exit 0
          fi
          echo "🔍 Aguardando backend em $BACKEND_URL/health ..."
          for i in {1..12}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$BACKEND_URL/health" || echo "000")
            echo "Attempt $i/12: HTTP $CODE"
            if [ "$CODE" = "200" ]; then
              echo "✅ Backend online!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check falhou após 2 minutos."
          exit 1
