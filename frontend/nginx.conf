server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-javascript;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # API proxy
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets inside locale subfolder
    location ~* ^/(pt|en|es)/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA routes inside /pt/
    location /pt/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /pt/index.html;
    }

    # Redirect root to /pt/
    location = / {
        return 302 /pt/;
    }

    # Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
