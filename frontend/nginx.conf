server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-javascript;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # API proxy
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # The Angular i18n build outputs assets with /pt/ prefix in index.html
    # but Dockerfile copies locale folder directly to /usr/share/nginx/html
    # so /pt/chunk-xxx.js must resolve to /chunk-xxx.js
    location ~ ^/(pt|en|es)/(.*)$ {
        alias /usr/share/nginx/html/$2;
        try_files $uri /index.html;
    }

    # Root SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
