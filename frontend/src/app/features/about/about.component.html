<section id="about" class="container">
  <h2>Sobre Mim</h2>
  @if (profile(); as p) {
    <div class="about-grid">
      <div class="about-text">
        <p>{{ bio() }}</p>
        <div class="stats">
          @for (stat of stats; track stat.label) {
            <div class="stat">
              <span class="stat-value">{{ stat.value }}</span>
              <span class="stat-label">{{ stat.label }}</span>
            </div>
          }
        </div>
      </div>
    </div>
  }
</section>
